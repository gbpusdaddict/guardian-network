<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Network</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="container">

    <h1>🛡️ Guardian Network</h1>

    <p class="subtitle">
        Help reaches you faster, even when the internet doesn't.
    </p>

    <!-- Emergency Contacts -->
    <section class="contacts-section">

        <h2>Emergency Contacts</h2>

        <input
            type="text"
            id="emergencyName"
            placeholder="Enter contact name">

        <input
            type="tel"
            id="emergencyNumber"
            placeholder="Enter emergency phone number"
            maxlength="11">

        <button id="saveContact">
            Save Contact
        </button>

        <ul id="contactList">
            <li>No contacts saved.</li>
        </ul>

    </section>

    <!-- SOS Section -->
    <section class="sos-section">

        <button class="sos-btn">
            🚨 SOS EMERGENCY
        </button>

        <button id="stopEmergency">
            Stop Emergency
        </button>

        <p id="status">
            Guardian Network is ready.
        </p>

    </section>

    <!-- Safety Check-In -->
    <section class="checkin-section">

        <h2>Safety Check-In</h2>

        <select id="checkInTime">
            <option value="5">5 Minutes</option>
            <option value="15" selected>15 Minutes</option>
            <option value="30">30 Minutes</option>
            <option value="60">1 Hour</option>
            <option value="120">2 Hours</option>
            <option value="180">3 Hours</option>
            <option value="360">6 Hours</option>
            <option value="720">12 Hours</option>
            <option value="1440">24 Hours</option>
        </select>

        <input
            type="text"
            id="customCheckIn"
            placeholder="Examples: 12m, 1h, 1:30, 2h30m">

        <button id="startCheckIn">
            Start Safety Check-In
        </button>

        <p id="checkInStatus">
            No active safety check-in.
        </p>

    </section>

    <!-- History -->
    <section class="history-section">

        <button
            id="viewHistory"
            onclick="window.location.href='history.html'">

            View Emergency History

        </button>

    </section>

</div>

<!-- Siren Audio -->
<audio id="siren" preload="auto">
    <source src="audio/siren.mp3" type="audio/mpeg">
</audio>

<script src="js/app.js"></script>


</body>
</html>
